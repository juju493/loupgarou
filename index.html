<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loup-Garou</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1c1c1c;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: #2b2b2b;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    .container {
      padding: 30px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
    }

    .start {
      background: #e63946;
      color: white;
    }

    .rules {
      background: #457b9d;
      color: white;
    }

    #game {
      margin-top: 30px;
      display: none;
    }
  </style>
</head>

<body>

<header>
  <h1>🐺 Loup-Garou</h1>
</header>

<div class="container">

  <button class="start" onclick="startGame()">Commencer la partie</button>
  <button class="rules" onclick="showRules()">Règles</button>

  <div id="game">
    <h2>La partie commence…</h2>
    <p>Les rôles seront bientôt ajoutés ici.</p>
  </div>

</div>

<script>
  function startGame() {
    document.getElementById("game").style.display = "block";
  }

  function showRules() {
    alert("Le but du jeu est de démasquer les loups-garous !");
  }
</script>

</body>
</html>
